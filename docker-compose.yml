version: "3.9"

services:
  # PostgreSQL — 生产推荐
  postgresql:
    image: postgres:17-alpine
    container_name: tsn-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: TinySyncNote
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  # MySQL — 备选支持
  mysql:
    image: mysql:8.4
    container_name: tsn-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: TinySyncNote
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  pgdata:
  mysqldata:
